<ion-content>

  <h1>Estadísticas</h1>
  <h2>Tu progreso en hábitos y tareas</h2>

  <main>

    <!-- RESUMEN -->

    <section id="resumen-general">

      <div class="stat-card">
        <span class="icono">✅</span>
        <span class="numero">18</span>
        <span class="texto">Hábitos completados</span>
      </div>

      <div class="stat-card">
        <span class="icono">📋</span>
        <span class="numero">12</span>
        <span class="texto">Tareas completadas</span>
      </div>

      <div class="stat-card">
        <span class="icono">🔥</span>
        <span class="numero">8</span>
        <span class="texto">Días de racha</span>
      </div>

      <div class="stat-card">
        <span class="icono">📈</span>
        <span class="numero">75%</span>
        <span class="texto">Cumplimiento</span>
      </div>

    </section>

    <!-- ACTIVIDAD SEMANAL -->

    <h2>Actividad semanal</h2>

    <section id="actividad">

      <div class="dia">
        <span>Lun</span>
        <span>3</span>
      </div>

      <div class="dia">
        <span>Mar</span>
        <span>5</span>
      </div>

      <div class="dia">
        <span>Mié</span>
        <span>2</span>
      </div>

      <div class="dia">
        <span>Jue</span>
        <span>4</span>
      </div>

      <div class="dia">
        <span>Vie</span>
        <span>6</span>
      </div>

    </section>

    <!-- PROGRESO -->

    <h2>Progreso general</h2>

    <section id="progreso">

      <div class="progreso-card">

        <span class="titulo">Hábitos</span>

        <div class="barra">
          <div class="relleno-habitos"></div>
        </div>

        <span class="porcentaje">75%</span>

      </div>

      <div class="progreso-card">

        <span class="titulo">Tareas</span>

        <div class="barra">
          <div class="relleno-tareas"></div>
        </div>

        <span class="porcentaje">60%</span>

      </div>

    </section>

  </main>

  <app-bottom-navigation></app-bottom-navigation>

</ion-content>
